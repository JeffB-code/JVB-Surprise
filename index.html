<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can I court you?</title>
    <link type="image/png" sizes="16x16" rel="icon" href="assets/icons8-heart-color-glass-16.png">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cute+Font&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(to top right, #3643ff, #ffd1dc);
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      height: 110vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: row;
      position: relative;
    }

    #content {
      display: flex;
      flex-direction: row;
      align-items: center;
      text-align: center;
      z-index: 5;
    }

    .question {
      font-size: 2.5rem;
      color: black; /* text color black */
      text-shadow: 1px 1px 2px #974aa1;
      opacity: 0;
      transform: scale(0.8);
      animation: showQuestion 2s forwards;
      padding: 20px;
      max-width: 90%;
    }

    @keyframes showQuestion {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .heart {
      width: 20px;
      height: 20px;
      background-color: rgb(255, 0, 0);
      position: absolute;
      top: 100%;
      transform: rotate(-45deg);
      animation: floatUp 8s linear infinite;
      opacity: 0;
      z-index: 0;
    }

    .heart::before,
    .heart::after {
      content: "";
      width: 20px;
      height: 20px;
      background-color: rgb(255, 0, 0);
      border-radius: 50%;
      position: absolute;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      left: 10px;
      top: 0;
    }

    @keyframes floatUp {
      0% {
        top: 100%;
        opacity: 0;
        transform: translateX(0) translateY(0) rotate(-45deg) scale(0.5);
      }
      10% {
        opacity: 1;
      }
      100% {
        top: -10%;
        transform: translateX(0) translateY(-100vh) rotate(360deg) scale(1.2);
        opacity: 0;
      }
    }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .message {
                       font-size: 3em;
            margin-bottom: 20px;
            color: rgb(255, 255, 255); /* text color black */
      text-shadow: 1px 1px 2px #ff69b4;
      opacity: 0;
      transform: scale(0.8);
      animation: showQuestion 2s forwards;
        }
        
        .title {
            font-size: 3em;
            margin-bottom: 20px;
            color: rgb(255, 255, 255); /* text color black */
      text-shadow: 1px 1px 2px #ff69b4;
      opacity: 0;
      transform: scale(0.8);
      animation: showQuestion 2s forwards;
        }

        img {
        width: 350px;
        height: auto;
        }

        .button {
      margin-top: 30px;
      padding: 10px 30px;
      background: #ff4d6d;
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 3rem;
      cursor: pointer;
      box-shadow: 2px 2px 10px #ff8fa3;
      transition: transform 0.3s;
        }
            button:hover {
      transform: scale(1.1);
    }

        .modal-content {
            text-align: center;
        }

        .modal-header {
            border-bottom: none;
        }

        .modal-body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        img {
            max-width: 100%;
            height: auto;
        }
        

        @media (max-width: 600px) {
            body {
                overflow: hidden;
            }
            .message {
                font-size: 2.5em;
            }
            .button {
                padding: 8px 16px;
                font-size: 1em;
            }
        }

    </style>

</head>
<body>

<div class="container">
    <div class="title" id="marryText">Mariane, <br> pwede ba kitang ligawan?</div>
    <img src="assets/please.gif" alt="Love Wall" class="img-fluid" id="loveImage"><br>
    <div class="message"> ❤️ </div>
    <div class="button-container">
        <button class="btn btn-danger button yes">Yes</button>
        <button class="btn btn-danger button no">No</button>
    </div>
    <audio id="loveSong" src="assets/winning.mp3" preload="auto"></audio>
</div>

<div class="modal fade" id="noInspectModal" tabindex="-1" role="dialog" aria-labelledby="noInspectModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-body">
                <h5>No Page Sourcing & Inspect!</h5>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
const yesButton = document.querySelector('.yes');
const noButton = document.querySelector('.no');
const message = document.querySelector('.message');
const loveImage = document.getElementById('loveImage');
const loveSong = document.getElementById('loveSong');
const marryText = document.getElementById('marryText');

const noMessages = [
    'Sure ka lan talaga?',
    'Bakit?',
    'Pls?',
    'Sure na talga?',
    'Come on, say yes pls!',
    'huhu',
    'Don\'t be shy!',
    'Ayaw talaga?',
    'Give me chance.',
    'Please consider it!'
];

let noClickCount = 0;

yesButton.addEventListener('click', () => {
    marryText.style.display = 'none';
    yesButton.style.display = 'none'; 
    noButton.style.display = 'none';
    message.textContent = 'Let\'s go!';
    loveImage.src = 'assets/yes.gif';
    loveSong.play();
});

noButton.addEventListener('click', () => {
    if (loveSong.paused === false) {
        loveSong.pause();
    }

    if (noClickCount < 10) {
        message.textContent = noMessages[noClickCount];
        noClickCount++;
        loveImage.src = `assets/sad${Math.min(noClickCount, 10)}.gif`;
        moveButton();
    }

    if (noClickCount === 10) {
        yesButton.style.display = 'show';
        yesButton.style.display = 'show';
        message.textContent = 'HAHA!';
    }
});

const moveButton = () => {
    const x = Math.random() * (window.innerWidth - noButton.offsetWidth);
    const y = Math.random() * (window.innerHeight - noButton.offsetHeight);
    noButton.style.position = 'absolute';
    noButton.style.left = `${x}px`;
    noButton.style.top = `${y}px`;
};

document.addEventListener('contextmenu', event => {
    event.preventDefault();
    $('#noInspectModal').modal('show');
});

document.addEventListener('keydown', event => {
    if (event.key === 'F12') {
        event.preventDefault();
        $('#noInspectModal').modal('show');
    }
});

  for (let i = 0; i < 30; i++) {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (5 + Math.random() * 5) + 's';
    heart.style.animationDelay = (Math.random() * 5) + 's';
    document.body.appendChild(heart);
  }
</script>

</body>
</html>
